<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Kanban | Workflow Management</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <span class="brand">Early<span>Edge</span></span>
            <div class="actions">
                <button id="add-task-btn" class="btn-primary">
                    <span class="icon">+</span> New Task
                </button>
            </div>
        </div>
    </nav>

    <main class="board-container">
        <div class="kanban-board">
            <section class="column" id="todo">
                <div class="column-header">
                    <span class="status-dot todo-dot"></span>
                    <h2>To Do</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="drop-zone" data-column="todo">
                    </div>
            </section>

            <section class="column" id="inprogress">
                <div class="column-header">
                    <span class="status-dot progress-dot"></span>
                    <h2>In Progress</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="drop-zone" data-column="inprogress">
                </div>
            </section>

            <section class="column" id="done">
                <div class="column-header">
                    <span class="status-dot done-dot"></span>
                    <h2>Completed</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="drop-zone" data-column="done">
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
